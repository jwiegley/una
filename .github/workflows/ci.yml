name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  nix-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            accept-flake-config = true

      - uses: cachix/cachix-action@v15
        with:
          name: una
          skipPush: true
        continue-on-error: true

      - name: Build
        run: nix build --no-warn-dirty

      - name: Run flake checks
        run: nix flake check --no-warn-dirty

  lefthook-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            accept-flake-config = true

      - name: Check formatting (fourmolu)
        run: nix develop --command fourmolu --mode check Main.hs

      - name: Lint (hlint)
        run: nix develop --command hlint Main.hs
